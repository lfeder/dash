<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack Plan</title>
<script src="../lib/data-source.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#1a1a2e; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; }

/* Header */
#hdr { background:#16213e; padding:7px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #0f3460; flex-shrink:0; flex-wrap:wrap; }
#hdr h1 { font-size:1rem; color:#4ecca3; white-space:nowrap; }
#version { margin-left:auto; font-size:0.7rem; color:#e0e0e0; white-space:nowrap; }
input[type=date] { background:#0f3460; color:#e0e0e0; border:1px solid #2a3a5e; border-radius:4px; padding:3px 7px; font-size:0.82rem; }
input[type=date]:focus { outline:none; border-color:#4ecca3; }
#cycle-label { font-size:0.76rem; color:#777; white-space:nowrap; }
.ds { font-size:0.74rem; }
.ds.loading { color:#f1c40f; }
.ds.loaded  { color:#4ecca3; }
.ds.error   { color:#e07070; }

/* Segment toggles */
.seg { display:flex; border:1px solid #2a3a5e; border-radius:4px; overflow:hidden; }
.seg button { padding:3px 9px; font-size:0.76rem; background:transparent; color:#555; border:none; cursor:pointer; }
.seg button[data-val="wet"].active    { background:rgba(52,152,219,.2);  color:#6ab4f5; }
.seg button[data-val="avg"].active    { background:rgba(241,196,15,.18); color:#f1c40f; }
.seg button[data-val="dry"].active    { background:rgba(78,204,163,.18); color:#4ecca3; }
.seg button[data-val="better"].active { background:rgba(78,204,163,.18); color:#4ecca3; }
.seg button[data-val="same"].active   { background:rgba(241,196,15,.18); color:#f1c40f; }
.seg button[data-val="worse"].active  { background:rgba(231,76,60,.18);  color:#e07070; }
.seg button.active { background:#0f3460; color:#e0e0e0; }

/* Two-panel layout */
#body { flex:1; display:flex; overflow:hidden; }

/* Left panel */
#left { width:230px; flex-shrink:0; background:#16213e; border-right:1px solid #0f3460; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
.sb { display:flex; flex-direction:column; gap:7px; }
.sb-title { font-size:0.68rem; color:#555; text-transform:uppercase; letter-spacing:.06em; padding-bottom:5px; border-bottom:1px solid #0f3460; }
.sf { display:flex; align-items:center; justify-content:space-between; gap:6px; font-size:0.78rem; }
.sf label { color:#888; white-space:nowrap; }
input[type=number].sm { width:72px; text-align:right; background:#0f3460; color:#e0e0e0; border:1px solid #2a3a5e; border-radius:4px; padding:2px 5px; font-size:0.82rem; }
input[type=number].sm:focus { outline:none; border-color:#4ecca3; }
input[type=time] { width:95px; background:#0f3460; color:#e0e0e0; border:1px solid #2a3a5e; border-radius:4px; padding:2px 6px; font-size:0.8rem; }
input[type=time]:focus { outline:none; border-color:#4ecca3; }
.fill-line { display:flex; align-items:center; gap:6px; }
.fill-pct { font-size:0.95rem; font-weight:700; }
.badge { display:inline-block; padding:1px 7px; border-radius:8px; font-size:0.68rem; font-weight:600; }
.badge-full { background:rgba(78,204,163,.18); color:#4ecca3; }
.badge-sel  { background:rgba(241,196,15,.18); color:#f1c40f; }
.badge-lite { background:rgba(52,152,219,.18); color:#6ab4f5; }
.fill-track { flex:1; background:#0a1428; border-radius:3px; height:4px; overflow:hidden; }
.fill-bar   { height:100%; border-radius:3px; transition:width .3s,background .3s; }

/* Right panel */
#right { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:12px; }
.card { background:#16213e; border-radius:8px; border:1px solid #0f3460; padding:12px 14px; }
.card-title { font-size:0.68rem; color:#555; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
.card-subtitle { font-size:0.72rem; color:#888; margin-top:-4px; margin-bottom:8px; }

/* Orders table */
.ot { width:100%; border-collapse:collapse; font-size:0.82rem; }
.ot th { color:#555; font-weight:500; padding:2px 8px 5px; border-bottom:1px solid #0f3460; }
.ot th:first-child { text-align:left; }
.ot th:not(:first-child) { text-align:right; }
.ot td { padding:2px 8px; text-align:right; font-variant-numeric:tabular-nums; }
.ot td:first-child { text-align:left; color:#bbb; }
.ot .lb-cell { color:#888; }
.ot .total-row td { border-top:1px solid #0f3460; padding-top:4px; font-weight:600; color:#e0e0e0; }
input.ot-inp { width:62px; text-align:right; background:#0f3460; color:#e0e0e0; border:1px solid #2a3a5e; border-radius:4px; padding:2px 5px; font-size:0.82rem; }
input.ot-inp:focus { outline:none; border-color:#4ecca3; }

/* Harvest schedule table */
.hs { width:100%; border-collapse:collapse; font-size:0.8rem; }
.hs th { color:#555; font-weight:500; padding:2px 8px 5px; border-bottom:1px solid #0f3460; text-align:right; white-space:nowrap; }
.hs th:first-child, .hs th:nth-child(2) { text-align:left; }
.hs td { padding:3px 8px; text-align:right; font-variant-numeric:tabular-nums; vertical-align:middle; color:#aaa; }
.hs td:first-child { text-align:left; color:#ccc; font-weight:600; white-space:nowrap; }
.hs td:nth-child(2) { text-align:left; color:#888; }
.hs tr:hover td { background:rgba(255,255,255,.03); }
.hs tfoot td { border-top:1px solid #0f3460; padding-top:5px; font-weight:600; color:#e0e0e0; }
.hs tfoot td:first-child { color:#888; }
.dis-hdr { color:#e07070 !important; }
.sto-hdr { color:#6ab4f5 !important; }
.ph-hdr  { color:#4ecca3 !important; }
.dis-col { color:#c05050; }
.sto-col { color:#5090c0; }
.ph-col  { color:#3aaa85; }
.pond-fans { font-size:0.6rem; color:#4ecca3; vertical-align:super; }
.no-data  { color:#444; font-size:0.76rem; padding:8px 0; }
</style>
</head>
<body>

<div id="hdr">
  <h1>Lettuce Pack Plan</h1>
  <input type="date" id="pack-date">
  <span id="cycle-label"></span>
  <span id="data-status" class="ds">—</span>
  <span id="version"></span>
</div>

<div id="body">

<!-- LEFT PANEL -->
<div id="left">

  <!-- Conditions -->
  <div class="sb">
    <div class="sb-title">Conditions</div>
    <div class="sf"><label>Today</label>
      <div class="seg" id="seg-today">
        <button data-val="wet">Wet</button>
        <button data-val="avg" class="active">Avg</button>
        <button data-val="dry">Dry</button>
      </div>
    </div>
    <div class="sf"><label>Tomorrow</label>
      <div class="seg" id="seg-tomorrow">
        <button data-val="better">Better</button>
        <button data-val="same" class="active">Same</button>
        <button data-val="worse">Worse</button>
      </div>
    </div>
    <div class="sf"><label>Data</label>
      <div class="seg" id="seg-data-mode">
        <button data-val="sheets" class="active">Sheets</button>
        <button data-val="db">DB</button>
      </div>
    </div>
  </div>

  <!-- D1 -->
  <div class="sb">
    <div class="sb-title">D1 Plan</div>
    <div class="sf"><label>Harvest lb</label><input type="number" class="sm" id="d1-hlb" value="3500" min="0"></div>
    <div class="sf"><label>Rows</label><input type="number" class="sm" id="d1-rows" value="9" min="1"></div>
    <div class="fill-line">
      <span class="fill-pct" id="d1-fillpct">0%</span>

      <div class="fill-track"><div class="fill-bar" id="d1-fillbar" style="width:0%"></div></div>
    </div>
    <div class="sf"><label>Harvest start</label><input type="time" id="d1-hstart"></div>
    <div class="sf"><label>Cut height</label>
      <div class="seg" id="seg-d1-cut"><button data-val="hi">Hi</button><button data-val="med" class="active">Med</button><button data-val="lo">Lo</button></div>
    </div>
    <div class="sf"><label>PH start</label><input type="time" id="d1-phstart"></div>
    <div class="sf"><label>PH fans</label>
      <div class="seg" id="seg-d1-fans"><button data-val="y">Y</button><button data-val="n" class="active">N</button></div>
    </div>
    <div class="sf"><label>Dryer heat</label>
      <div class="seg" id="seg-d1-heat"><button data-val="y">Y</button><button data-val="n" class="active">N</button></div>
    </div>
    <div class="sf"><label>Blowers</label>
      <div class="seg" id="seg-d1-blow"><button data-val="y" class="active">Y</button><button data-val="n">N</button></div>
    </div>
    <div class="sf"><label>Speed</label>
      <div class="seg" id="seg-d1-speed"><button data-val="lo">Lo</button><button data-val="med" class="active">Med</button><button data-val="hi">Hi</button></div>
    </div>
    <div class="sf"><label>Cool room</label>
      <div class="seg" id="seg-d1-cool"><button data-val="y" class="active">Y</button><button data-val="n">N</button></div>
    </div>
  </div>

  <!-- D2 -->
  <div class="sb">
    <div class="sb-title">D2 Plan</div>
    <div class="sf"><label>Harvest lb</label><input type="number" class="sm" id="d2-hlb" value="2500" min="0"></div>
    <div class="sf"><label>Rows</label><input type="number" class="sm" id="d2-rows" value="6" min="1"></div>
    <div class="fill-line">
      <span class="fill-pct" id="d2-fillpct">0%</span>
      <span class="badge badge-lite" id="d2-badge">—</span>
      <div class="fill-track"><div class="fill-bar" id="d2-fillbar" style="width:0%"></div></div>
    </div>
    <div class="sf"><label>Harvest start</label><input type="time" id="d2-hstart"></div>
    <div class="sf"><label>Cut height</label>
      <div class="seg" id="seg-d2-cut"><button data-val="hi">Hi</button><button data-val="med" class="active">Med</button><button data-val="lo">Lo</button></div>
    </div>
    <div class="sf"><label>PH start</label><input type="time" id="d2-phstart"></div>
    <div class="sf"><label>PH fans</label>
      <div class="seg" id="seg-d2-fans"><button data-val="y">Y</button><button data-val="n" class="active">N</button></div>
    </div>
    <div class="sf"><label>Dryer heat</label>
      <div class="seg" id="seg-d2-heat"><button data-val="y">Y</button><button data-val="n" class="active">N</button></div>
    </div>
    <div class="sf"><label>Blowers</label>
      <div class="seg" id="seg-d2-blow"><button data-val="y" class="active">Y</button><button data-val="n">N</button></div>
    </div>
    <div class="sf"><label>Speed</label>
      <div class="seg" id="seg-d2-speed"><button data-val="lo">Lo</button><button data-val="med" class="active">Med</button><button data-val="hi">Hi</button></div>
    </div>
    <div class="sf"><label>Cool room</label>
      <div class="seg" id="seg-d2-cool"><button data-val="y" class="active">Y</button><button data-val="n">N</button></div>
    </div>

</div><!-- #left -->

<!-- RIGHT PANEL -->
<div id="right">

  <!-- Orders -->
  <div class="card">
    <div class="card-title">Orders</div>
    <table class="ot">
      <thead>
        <tr>
          <th>SKU</th>
          <th style="text-align:right">D1 Cases</th><th style="text-align:right">D1 Lb</th>
          <th style="text-align:right">D2 Cases</th><th style="text-align:right">D2 Lb</th>
          <th style="text-align:right">Total Lb</th>
        </tr>
      </thead>
      <tbody id="order-body"></tbody>
    </table>
  </div>

  <!-- Harvest Schedule D1 -->
  <div class="card">
    <div class="card-title">Harvest Schedule — D1</div>
    <div class="card-subtitle" id="d1-hs-sub"></div>
    <div id="d1-hs"></div>
  </div>

  <!-- Harvest Schedule D2 -->
  <div class="card">
    <div class="card-title">Harvest Schedule — D2</div>
    <div class="card-subtitle" id="d2-hs-sub"></div>
    <div id="d2-hs"></div>
  </div>

</div><!-- #right -->
</div><!-- #body -->

<script>
const SKU_LB = {LW:10.5, LR:2.25, LF:10.0, WR:2.25};
const SKUS   = ['LW','LR','LF','WR'];
const POND_ORDER = ['P1','P2','P3','P4','P5','P6','P7'];
const SIDE_ORDER = {'C':0,'A':1,'B':2,'AB':3};
const POND_FANS  = new Set(['P7']);

let weatherToday = 'avg', tomorrowTrend = 'same';
let packDataMode = localStorage.getItem('packPlanDataMode') || 'sheets';
let d1Date = '', d2Date = '';

function $id(id) { return document.getElementById(id); }
function numVal(id) { return parseFloat($id(id).value) || 0; }
function segVal(id) { const b = document.querySelector(`#${id} button.active`); return b ? b.dataset.val : null; }
function fmt(n) { return Math.round(n).toLocaleString(); }
function fmtLb(n) { return fmt(n) + ' lb'; }

// ── Date helpers ──────────────────────────────────────────────────────────────
function isoToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isoAddDays(iso, n) {
  const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function packCycleDates(iso) {
  const d = new Date(iso + 'T12:00:00'), dow = d.getDay();
  if (dow === 0 || dow === 3) return {d1: iso, d2: isoAddDays(iso, 1)};
  if (dow === 1 || dow === 4) return {d1: isoAddDays(iso, -1), d2: iso};
  const snap = dow === 2 ? 1 : dow === 5 ? 2 : 1;
  return {d1: isoAddDays(iso, snap), d2: isoAddDays(iso, snap + 1)};
}
const DOW_NAME = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function shortDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  return `${DOW_NAME[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
}

// ── Build order rows ──────────────────────────────────────────────────────────
(function() {
  const tb = $id('order-body');
  SKUS.forEach(sku => {
    const s = sku.toLowerCase();
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${sku}</td>
      <td><input class="ot-inp" type="number" id="d1-${s}" min="0" value="0"></td>
      <td class="lb-cell" id="d1-${s}-lb">0</td>
      <td><input class="ot-inp" type="number" id="d2-${s}" min="0" value="0"></td>
      <td class="lb-cell" id="d2-${s}-lb">0</td>
      <td class="lb-cell" id="tot-${s}-lb">0</td>`;
    tb.appendChild(tr);
  });
  const tf = document.createElement('tr');
  tf.className = 'total-row';
  tf.innerHTML = `<td>Total</td><td></td>
    <td class="lb-cell" id="d1-order-total">0</td><td></td>
    <td class="lb-cell" id="d2-order-total">0</td>
    <td class="lb-cell" id="tot-order-total">0</td>`;
  tb.appendChild(tf);
})();

// ── Calculation ───────────────────────────────────────────────────────────────
function orderLb(day) {
  return SKUS.reduce((s,sku) => s + numVal(`${day}-${sku.toLowerCase()}`) * SKU_LB[sku], 0);
}

function recPlan(orderLb, harvestLb, rows, weather, tomorrow, storageLb) {
  if (rows === 0 || harvestLb === 0) return {dispose:0, store:0, ph:0, mode:'—', fillRate:0, lbRow:0};
  if (orderLb === 0) return {dispose:0, store:0, ph:0, mode:'No orders', fillRate:0, lbRow:harvestLb/rows};
  const lbRow = harvestLb / rows, fillRate = orderLb / harvestLb;
  const wet = weather==='wet', better = tomorrow==='better', worse = tomorrow==='worse';
  const netOrd = Math.max(0, orderLb - storageLb);
  const rowsForPH = Math.ceil(netOrd / lbRow);
  let dispose, store, ph, mode;
  if (fillRate > 0.9) {
    mode='Full send'; dispose = wet?1:0; store=0; ph=rows-dispose;
  } else if (fillRate > 0.6) {
    mode='Selective'; dispose = wet?2:1;
    const rem = rows-dispose;
    if (wet && better)  { ph=Math.max(0,Math.min(rowsForPH-1,rem)); store=Math.max(0,rem-ph); }
    else if (worse)     { ph=rem; store=0; }
    else                { ph=Math.min(rowsForPH,rem); store=Math.max(0,rem-ph); }
  } else {
    dispose=Math.min(wet?3:2,rows-1);
    const rem=rows-dispose;
    if (wet && better)  { mode='Store all'; ph=0; store=rem; }
    else                { mode='Light'; ph=Math.min(rowsForPH,rem); store=Math.max(0,rem-ph); }
  }
  dispose=Math.max(0,dispose); store=Math.max(0,store); ph=Math.max(0,ph);
  const sum=dispose+store+ph; if(sum!==rows) store=Math.max(0,store+(rows-sum));
  return {dispose, store, ph, mode, fillRate, lbRow};
}

function fillColor(r) { return r>0.9?'#4ecca3':r>0.6?'#f1c40f':'#6ab4f5'; }
function badgeClass(m) {
  if (m==='Full send') return 'badge badge-full';
  if (m==='Selective')  return 'badge badge-sel';
  return 'badge badge-lite';
}

// ── Grow data ─────────────────────────────────────────────────────────────────
let cachedOrders=null, cachedHarvest=null, cachedGrow=null;
let cachedActualLb = {}; // harvest_date → actual net lb from grow_harvest_weight

function gvizToISO(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return null;
  const m = String(cell.v).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (!m) return null;
  return `${m[1]}-${String(parseInt(m[2])+1).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
}
function colIdx(cols, label) { return cols.findIndex(c => c.label === label); }

function calcRows(pond, side, boards) {
  if (!boards) return 0;
  let bpr;
  if (pond==='P1') bpr = side==='AB'?10:5;
  else             bpr = side==='AB'?20:side==='C'?6:10;
  return Math.round(boards / bpr);
}

function computeEstLb(pondData, p1by, p2by, dateISO) {
  if (dateISO < isoToday() && pondData.expLb > 0) return pondData.expLb;
  const key = `${pondData.pond}|${pondData.side}`;
  const w1 = p1by[key]?.expLb || 0, w2 = p2by[key]?.expLb || 0;
  if (w1 > 0 && w2 > 0) return (w1 + w2) / 2;
  return w1 || w2;
}

function growByDate(dateISO) {
  if (!cachedGrow) return {};
  const {cols, rows} = cachedGrow;
  const di=colIdx(cols,'HarvestDate'), pi=colIdx(cols,'Pond');
  const si=colIdx(cols,'Side'),        vi=colIdx(cols,'Variety');
  const bi=colIdx(cols,'Boards'),      li=colIdx(cols,'ExpLb');
  const ri=colIdx(cols,'Rows');
  if (di<0 || pi<0) return {};
  const byKey = {};
  rows.forEach(r => {
    if (gvizToISO(r.c[di]) !== dateISO) return;
    const pond = r.c[pi]?.v; if (!pond) return;
    const side = (si>=0 ? r.c[si]?.v : '')||'';
    const key  = `${pond}|${side}`;
    if (!byKey[key]) byKey[key] = {pond, side, varieties:new Set(), rows:0, boards:0, expLb:0};
    const variety = (vi>=0 ? r.c[vi]?.v : '')||'';
    if (variety) byKey[key].varieties.add(variety);
    const boards = parseFloat(r.c[bi]?.v)||0;
    const expLb  = parseFloat(r.c[li]?.v)||0;
    const rpc    = parseFloat(r.c[ri]?.v)||0;
    byKey[key].boards += boards;
    byKey[key].expLb  += expLb;
    byKey[key].rows   += rpc>0 ? rpc : calcRows(pond, side, boards);
  });
  return byKey;
}

function sortedEntries(byKey) {
  return Object.values(byKey).sort((a,b) => {
    const pd = POND_ORDER.indexOf(a.pond) - POND_ORDER.indexOf(b.pond);
    return pd!==0 ? pd : (SIDE_ORDER[a.side]??9)-(SIDE_ORDER[b.side]??9);
  }).map(p => ({...p, varieties:[...p.varieties].filter(Boolean)}));
}

function applyDisp(byKey, dispose, store) {
  const ponds = sortedEntries(byKey);
  const total = ponds.reduce((s,p) => s+p.rows, 0);
  const df = total > 0 ? dispose / total : 0;
  const sf = total > 0 ? store   / total : 0;
  ponds.forEach(p => {
    p.d  = Math.max(0, Math.round(p.rows * df));
    p.s  = Math.max(0, Math.min(p.rows - p.d, Math.round(p.rows * sf)));
    p.ph = p.rows - p.d - p.s;
  });
  return ponds;
}

function populateGrow(day, dateISO) {
  const byPond = growByDate(dateISO);
  const ponds  = sortedEntries(byPond);
  if (!ponds.length) return;
  const p1by = growByDate(isoAddDays(dateISO,-7));
  const p2by = growByDate(isoAddDays(dateISO,-14));
  const totalRows = ponds.reduce((s,p) => s+(p.rows||0), 0);
  const totalLb   = ponds.reduce((s,p) => s+computeEstLb(p,p1by,p2by,dateISO), 0);
  if (totalRows > 0) $id(`${day}-rows`).value = totalRows;
  if (totalLb   > 0) $id(`${day}-hlb`).value  = Math.round(totalLb);
}

function ordersByDate(dateISO) {
  if (!cachedOrders) return null;
  const {cols, rows} = cachedOrders;
  const di=colIdx(cols,'PackDate'), si=colIdx(cols,'SKU'), ci=colIdx(cols,'Cases');
  if (di<0||si<0||ci<0) return null;
  const result = {LW:0,LR:0,LF:0,WR:0};
  rows.forEach(r => {
    if (gvizToISO(r.c[di]) !== dateISO) return;
    const sku = r.c[si]?.v;
    if (Object.prototype.hasOwnProperty.call(result, sku))
      result[sku] += (r.c[ci]?.v)||0;
  });
  return result;
}

function harvestByDate(dateISO) {
  if (!cachedHarvest) return null;
  const {cols, rows} = cachedHarvest;
  const di=colIdx(cols,'HarvestDate'), bppi=colIdx(cols,'BoardsPerPond');
  const plbi=colIdx(cols,'PoundsPerBoard'), gnwi=colIdx(cols,'GreenhouseNetWeight');
  if (di<0) return null;
  const matching = rows.filter(r => gvizToISO(r.c[di]) === dateISO);
  if (!matching.length) return null;
  const totalLb = matching.reduce((sum,r) => {
    const gnw = gnwi>=0 ? r.c[gnwi]?.v : null;
    if (gnw) return sum+gnw;
    const bpp = bppi>=0?(r.c[bppi]?.v||0):0;
    const plb = plbi>=0?(r.c[plbi]?.v||0):0;
    return sum+bpp*plb;
  }, 0);
  return {rowCount:matching.length, totalLb};
}

function populateDay(day, dateISO) {
  const orders = ordersByDate(dateISO);
  if (orders) SKUS.forEach(sku => { $id(`${day}-${sku.toLowerCase()}`).value = orders[sku]||0; });
  const harv = harvestByDate(dateISO);
  if (harv) {
    $id(`${day}-hlb`).value  = Math.round(harv.totalLb);
    $id(`${day}-rows`).value = harv.rowCount;
  }
}

// ── Harvest schedule table ────────────────────────────────────────────────────
function renderSchedule(day, ponds, p1by, p2by, dateISO) {
  if (!ponds.length) return '<div class="no-data">No grow data for this date</div>';
  const fw = lb => (lb && lb > 0) ? fmt(Math.round(lb)) : '—';
  const p2Hdr = shortDate(isoAddDays(dateISO, -14));
  const p1Hdr = shortDate(isoAddDays(dateISO, -7));
  const p1ISO = isoAddDays(dateISO, -7), p2ISO = isoAddDays(dateISO, -14);
  let totDisLb=0, totStoLb=0, totPhLb=0, tot2Lb=0, tot1Lb=0, totEstLb=0, totRows=0;
  ponds.forEach(p => {
    const key  = `${p.pond}|${p.side}`;
    const est  = computeEstLb(p, p1by, p2by, dateISO);
    const lbRow = p.rows > 0 ? est / p.rows : 0;
    tot2Lb   += p2by[key]?.expLb || 0;
    tot1Lb   += p1by[key]?.expLb || 0;
    totEstLb += est;
    totRows  += p.rows;
    totDisLb += p.d * lbRow;
    totStoLb += p.s * lbRow;
    totPhLb  += p.ph * lbRow;
  });
  const act2 = cachedActualLb[p2ISO], act1 = cachedActualLb[p1ISO];
  const disp2Lb = act2 != null ? act2 : tot2Lb;
  const disp1Lb = act1 != null ? act1 : tot1Lb;
  return `<table class="hs">
    <thead><tr>
      <th style="text-align:left">${p2Hdr}</th>
      <th style="text-align:left">${p1Hdr}</th>
      <th style="text-align:left">Est</th>
      <th class="dis-hdr">Dispose</th>
      <th class="sto-hdr">Store</th>
      <th class="ph-hdr">Pack</th>
      <th>Rows</th>
    </tr></thead>
    <tbody><tr>
      <td style="text-align:left">${fw(disp2Lb)} lb</td>
      <td style="text-align:left">${fw(disp1Lb)} lb</td>
      <td style="text-align:left">${fw(totEstLb)} lb</td>
      <td class="dis-col">${fw(totDisLb)} lb</td>
      <td class="sto-col">${fw(totStoLb)} lb</td>
      <td class="ph-col">${fw(totPhLb)} lb</td>
      <td>${totRows}r</td>
    </tr></tbody>
  </table>`;
}

// ── Main update ───────────────────────────────────────────────────────────────
function update() {
  // Orders
  let d1Total=0, d2Total=0;
  SKUS.forEach(sku => {
    const s=sku.toLowerCase();
    const d1cs=numVal(`d1-${s}`), d2cs=numVal(`d2-${s}`);
    const d1lb=d1cs*SKU_LB[sku], d2lb=d2cs*SKU_LB[sku];
    d1Total+=d1lb; d2Total+=d2lb;
    $id(`d1-${s}-lb`).textContent  = fmt(d1lb);
    $id(`d2-${s}-lb`).textContent  = fmt(d2lb);
    $id(`tot-${s}-lb`).textContent = fmt(d1lb+d2lb);
  });
  $id('d1-order-total').textContent  = fmt(d1Total);
  $id('d2-order-total').textContent  = fmt(d2Total);
  $id('tot-order-total').textContent = fmt(d1Total+d2Total);

  // D1 fill rate
  const d1hlb=numVal('d1-hlb'), d1rows=numVal('d1-rows');
  const d1rec = recPlan(d1Total, d1hlb, d1rows, weatherToday, tomorrowTrend, 0);
  $id('d1-fillpct').textContent = Math.round(d1rec.fillRate*100)+'%';
  $id('d1-fillbar').style.width = Math.min(100,d1rec.fillRate*100)+'%';
  $id('d1-fillbar').style.background = fillColor(d1rec.fillRate);
  const b1=$id('d1-badge'); b1.textContent=d1rec.mode; b1.className=badgeClass(d1rec.mode);

  // D1 storage carry-in to D2
  const d1actStore = d1rec.store;
  const d1storeLb  = d1actStore * d1rec.lbRow;

  // D2 fill rate
  const d2hlb=numVal('d2-hlb'), d2rows=numVal('d2-rows');
  const d2weather = tomorrowTrend==='better'?'dry':tomorrowTrend==='worse'?'wet':'avg';
  const d2rec = recPlan(d2Total, d2hlb, d2rows, d2weather, 'same', 0);
  $id('d2-fillpct').textContent = Math.round(d2rec.fillRate*100)+'%';
  $id('d2-fillbar').style.width = Math.min(100,d2rec.fillRate*100)+'%';
  $id('d2-fillbar').style.background = fillColor(d2rec.fillRate);
  const b2=$id('d2-badge'); b2.textContent=d2rec.mode; b2.className=badgeClass(d2rec.mode);

  // D2 pull note
  const pullNote = $id('d2-pull-note');
  if (d1storeLb > 0) {
    pullNote.textContent = `Day 1 reserve: ~${fmt(d1storeLb)} lb in cold storage`;
    pullNote.style.color = '#6ab4f5';
  } else {
    pullNote.textContent = '';
  }

  // Harvest schedules
  if (cachedGrow) {
    const d1by=growByDate(d1Date), d2by=growByDate(d2Date);
    const d1p1=growByDate(isoAddDays(d1Date,-7)),  d1p2=growByDate(isoAddDays(d1Date,-14));
    const d2p1=growByDate(isoAddDays(d2Date,-7)),  d2p2=growByDate(isoAddDays(d2Date,-14));
    const d1ponds=applyDisp(d1by,d1rec.dispose,d1rec.store);
    const d2ponds=applyDisp(d2by,d2rec.dispose,d2rec.store);
    $id('d1-hs').innerHTML = renderSchedule('d1',d1ponds,d1p1,d1p2,d1Date);
    $id('d2-hs').innerHTML = renderSchedule('d2',d2ponds,d2p1,d2p2,d2Date);
    $id('d1-hs-sub').textContent = d1rec.lbRow>0 ? `${Math.round(d1rec.lbRow)} lb/row · ${Math.round(d1rec.fillRate*100)}% fill` : '';
    $id('d2-hs-sub').textContent = d2rec.lbRow>0 ? `${Math.round(d2rec.lbRow)} lb/row · ${Math.round(d2rec.fillRate*100)}% fill` : '';
  }
}

// ── Data loading ──────────────────────────────────────────────────────────────
function setStatus(msg,cls) { const e=$id('data-status'); e.textContent=msg; e.className='ds '+(cls||''); }

async function loadData() {
  setStatus('loading…','loading');
  const mode = packDataMode==='db' ? DataSource.getMode() : 'sheets';
  const [oR,hR,gR] = await Promise.allSettled([
    DataSource.fetchTable('lettuce_pack_orders', {mode}),
    DataSource.fetchTable('lettuce_harvest',     {mode}),
    DataSource.fetchTable('lettuce_grow_plan',   {mode}),
  ]);
  if (oR.status==='fulfilled') cachedOrders  = oR.value;
  if (hR.status==='fulfilled') cachedHarvest = hR.value;
  if (gR.status==='fulfilled') cachedGrow    = gR.value;
  const all=[oR,hR,gR], nok=all.every(r=>r.status==='rejected');
  setStatus(nok?'error':all.every(r=>r.status==='fulfilled')?'loaded':'partial', nok?'error':'loaded');
  applyDates();
  loadActualHarvestLb();
}

function applyDates() {
  if (d1Date) { populateGrow('d1',d1Date); populateDay('d1',d1Date); }
  if (d2Date) { populateGrow('d2',d2Date); populateDay('d2',d2Date); }
  update();
}

async function loadActualHarvestLb() {
  if (packDataMode !== 'db' || !d1Date) { cachedActualLb = {}; return; }
  const dates = [...new Set([
    isoAddDays(d1Date,-7), isoAddDays(d1Date,-14),
    isoAddDays(d2Date,-7), isoAddDays(d2Date,-14),
  ])];
  try {
    const client = await DataSource.getClient(DataSource.getMode());
    const { data, error } = await client
      .from('grow_harvest_weight')
      .select('harvest_date,site_id,net_weight')
      .in('harvest_date', dates)
      .in('site_id', ['p1','p2','p3','p4','p5','p6','p7'])
      .eq('is_deleted', false);
    if (error || !data) return;
    cachedActualLb = {};
    data.forEach(r => {
      cachedActualLb[r.harvest_date] = (cachedActualLb[r.harvest_date] || 0) + (parseFloat(r.net_weight) || 0);
    });
  } catch(e) { console.warn('loadActualHarvestLb:', e); }
  update();
}

// ── Segment wiring ────────────────────────────────────────────────────────────
function wireSeg(id, onChange) {
  const el=$id(id); if (!el) return;
  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if (onChange) onChange(btn.dataset.val);
      update();
    });
  });
}

$id('seg-data-mode').querySelectorAll('button').forEach(b =>
  b.classList.toggle('active', b.dataset.val===packDataMode));
wireSeg('seg-data-mode', v => {
  packDataMode=v; localStorage.setItem('packPlanDataMode',v);
  cachedOrders=null; cachedHarvest=null; cachedGrow=null; loadData();
});
wireSeg('seg-today',    v => { weatherToday  = v; });
wireSeg('seg-tomorrow', v => { tomorrowTrend = v; });
['d1','d2'].forEach(day => {
  ['cut','fans','heat','blow','speed','cool'].forEach(ctrl => wireSeg(`seg-${day}-${ctrl}`));
});

document.querySelectorAll('input[type=number], input[type=time]').forEach(el => {
  el.addEventListener('input', update);
});

// ── Date picker ───────────────────────────────────────────────────────────────
function onDateChange(iso) {
  const c = packCycleDates(iso||isoToday());
  d1Date=c.d1; d2Date=c.d2;
  $id('cycle-label').textContent = `D1: ${shortDate(d1Date)}  ·  D2: ${shortDate(d2Date)}`;
  $id('d1-hs').closest('.card').querySelector('.card-title').textContent = `Harvest Schedule — D1 · ${shortDate(d1Date)}`;
  $id('d2-hs').closest('.card').querySelector('.card-title').textContent = `Harvest Schedule — D2 · ${shortDate(d2Date)}`;
  applyDates();
  loadActualHarvestLb();
}
const dateEl = $id('pack-date');
dateEl.value = isoToday();
dateEl.addEventListener('change', () => onDateChange(dateEl.value));
onDateChange(dateEl.value);

loadData();

fetch('',{method:'HEAD'}).then(r=>{
  const d=new Date(r.headers.get('last-modified'));
  if(!d||isNaN(d)) return;
  const hst=new Date(d.getTime()-10*60*60*1000);
  const p=n=>String(n).padStart(2,'0');
  $id('version').textContent=`${p(hst.getUTCMonth()+1)}-${p(hst.getUTCDate())} ${p(hst.getUTCHours())}:${p(hst.getUTCMinutes())}`;
}).catch(()=>{});
</script>
