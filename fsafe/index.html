<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Safety</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="../lib/data-source.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  #header { background: #16213e; padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; }
  #header h1 { font-size: 1.3rem; color: #4ecca3; flex: 1; }
  #version { font-size: 0.7rem; color: #e0e0e0; }
  #loading { display: flex; align-items: center; justify-content: center; height: 80vh; font-size: 1.2rem; color: #4ecca3; }
  #content { display: none; padding: 16px 24px; display: none; }
  .card { background: #16213e; border-radius: 8px; padding: 16px; border: 1px solid #0f3460; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; color: #ccc; margin-bottom: 12px; }
  .chart-wrap { position: relative; height: 380px; }
  .legend-note { font-size: 0.75rem; color: #888; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: #0f3460; color: #aaa; font-weight: 600; padding: 6px 12px; border-bottom: 2px solid #0f3460; text-align: right; }
  th:first-child { text-align: left; }
  td { padding: 5px 12px; border-bottom: 1px solid #0f3460; text-align: right; }
  td:first-child { text-align: left; color: #ccc; }
  tr:hover td { background: rgba(78,204,163,0.05); }
  .apc-hi { color: #e74c3c; }
  .apc-lo { color: #4ecca3; }
</style>
</head>
<body>

<div id="header">
  <h1>Food Safety — Lettuce</h1>
  <span id="version">05-29 10:55</span>
</div>

<div id="loading">Loading data…</div>

<div id="content">
  <div class="card">
    <h2>Shelf Life vs APC — Monthly</h2>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="legend-note">Shelf life = avg final shelf life days (good trials only). APC = median (initial tests only, CFU/g ÷ 1,000).</div>
  </div>

  <div class="card">
    <h2>Monthly Detail — Jan 2025 onward</h2>
    <table>
      <thead>
        <tr>
          <th>Month</th>
          <th>Avg Shelf Life (days)</th>
          <th># Trials</th>
          <th>Median APC (1k CFU/g)</th>
          <th># Tests</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
let chart = null;

async function load() {
  const client = await DataSource.getClient();

  const [slResp, apcResp] = await Promise.all([
    client.from('fsafe_shelf_life_monthly_v').select('*').order('month'),
    client.from('fsafe_apc_monthly_v').select('*').order('month'),
  ]);

  if (slResp.error) console.error('SL error', slResp.error);
  if (apcResp.error) console.error('APC error', apcResp.error);

  const slData  = slResp.data  || [];
  const apcData = apcResp.data || [];

  // Union of months
  const allMonths = [...new Set([
    ...slData.map(r => r.month.slice(0, 7)),
    ...apcData.map(r => r.month.slice(0, 7)),
  ])].sort();

  const slByMonth  = Object.fromEntries(slData.map(r  => [r.month.slice(0, 7), r]));
  const apcByMonth = Object.fromEntries(apcData.map(r => [r.month.slice(0, 7), r]));

  const labels   = allMonths.map(mo => fmtMonth(mo));
  const slValues = allMonths.map(mo => slByMonth[mo]?.avg_shelf_life_days ?? null);
  const apcValues = allMonths.map(mo => apcByMonth[mo]?.median_apc_k ?? null);

  // Chart
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Shelf Life (days)',
          data: slValues,
          yAxisID: 'ySL',
          borderColor: '#4ecca3',
          backgroundColor: '#4ecca3',
          pointStyle: 'circle',
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.3,
          spanGaps: true,
        },
        {
          label: 'APC (1k CFU/g)',
          data: apcValues,
          yAxisID: 'yAPC',
          borderColor: '#f39c12',
          backgroundColor: '#f39c12',
          pointStyle: 'circle',
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.3,
          spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            usePointStyle: true,
            pointStyle: 'circle',
            font: { size: 11 },
            color: '#ccc',
          },
        },
        tooltip: {
          callbacks: {
            label(ctx) {
              if (ctx.parsed.y === null) return null;
              if (ctx.dataset.yAxisID === 'ySL') return `Shelf Life: ${ctx.parsed.y} days`;
              return `APC: ${ctx.parsed.y}k CFU/g`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { font: { size: 11 }, color: '#aaa', maxRotation: 45 },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
        ySL: {
          type: 'linear',
          position: 'left',
          title: { display: true, text: 'Shelf Life (days)', color: '#4ecca3', font: { size: 11 } },
          ticks: { font: { size: 11 }, color: '#4ecca3' },
          grid: { color: 'rgba(78,204,163,0.1)' },
          min: 0,
        },
        yAPC: {
          type: 'linear',
          position: 'right',
          title: { display: true, text: 'APC (1k CFU/g)', color: '#f39c12', font: { size: 11 } },
          ticks: { font: { size: 11 }, color: '#f39c12' },
          grid: { drawOnChartArea: false },
          min: 0,
        },
      },
    },
  });

  // Table — Jan 2025+
  const tableMonths = allMonths.filter(mo => mo >= '2025-01');
  const tbody = document.getElementById('tableBody');
  for (const mo of tableMonths) {
    const sl  = slByMonth[mo];
    const apc = apcByMonth[mo];
    const apcVal = apc?.median_apc_k ?? null;
    const apcClass = apcVal === null ? '' : apcVal >= 300 ? 'apc-hi' : 'apc-lo';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${fmtMonth(mo)}</td>
      <td>${sl?.avg_shelf_life_days ?? '—'}</td>
      <td>${sl?.trial_count ?? '—'}</td>
      <td class="${apcClass}">${apcVal !== null ? apcVal : '—'}</td>
      <td>${apc?.test_count ?? '—'}</td>
    `;
    tbody.appendChild(tr);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function fmtMonth(mo) {
  const [y, m] = mo.split('-');
  return new Date(+y, +m - 1, 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

load().catch(err => {
  document.getElementById('loading').textContent = 'Error: ' + (err.message || err);
  console.error(err);
});
</script>
</body>
</html>
