// --- ISO week helpers ---
function getISOWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
  const y = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return Math.ceil(((t - y) / 86400000 + 1) / 7);
}
function getISOYear(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
  return t.getUTCFullYear();
}
function currentISOWeek() {
  const now = new Date();
  return getISOWeek(now);
}
function maxWeek() {
  const now = new Date();
  const hst = new Date(now.getTime() - 10*60*60*1000);
  const day = hst.getUTCDay(), hour = hst.getUTCHours();
  return ((day===5 && hour>=12) || day===6 || day===0) ? currentISOWeek() : currentISOWeek()-1;
}
const MAX_WEEK = maxWeek();

// Friday-to-Friday ISO week: shift date so Friday starts new week
function fridayISOWeek(d) {
  const shifted = new Date(d);
  shifted.setDate(shifted.getDate() + 3);
  return { year: getISOYear(shifted), week: getISOWeek(shifted) };
}

// --- Data fetching ---
function fetchSalesTab(gid) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + gid;
    const url = `https://docs.google.com/spreadsheets/d/${SALES_SHEET}/gviz/tq?tqx=out:json;responseHandler:${cb}&gid=${gid}`;
    window[cb] = function(resp) {
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (resp.status === 'error') { reject(resp.errors); return; }
      resolve(parseSalesTable(resp.table));
    };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => { delete window[cb]; reject('Network error'); };
    document.head.appendChild(script);
  });
}

function fetchGrowTab(tabName) {
  return new Promise((resolve, reject) => {
    const cb = '_cb_' + Math.random().toString(36).slice(2, 10);
    const url = `https://docs.google.com/spreadsheets/d/${GROW_SHEET}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(tabName)}`;
    window[cb] = function(resp) {
      delete window[cb];
      if (resp.status === 'error') { reject(resp.errors); return; }
      resolve(parseGrowTable(resp.table));
    };
    const s = document.createElement('script');
    s.src = url;
    s.onerror = () => { delete window[cb]; s.remove(); reject('Network error'); };
    document.head.appendChild(s);
  });
}

function parseSalesTable(table) {
  const cols = table.cols.map(c => c.label);
  const intCols = new Set(['Cases','Year','Month','ISOYear','ISOWeek','DOW','Grade']);
  return table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      const col = cols[i];
      if (!col) return;
      if (!cell || cell.v == null) { obj[col] = ''; return; }
      if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) { obj[col] = cell.f || cell.v; }
      else if (intCols.has(col) && typeof cell.v === 'number') { obj[col] = Math.round(cell.v); }
      else { obj[col] = cell.v; }
    });
    return obj;
  }).filter(r => r.ProductCode && r.ProductCode !== 'Sales' && r.CustomerName !== 'Kaukau 4 Keiki');
}

function parseGrowTable(table) {
  const cols = table.cols.map(c => (c.label || c.id).toLowerCase());
  return table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      const col = cols[i];
      if (!col) return;
      if (!cell || cell.v == null) { obj[col] = ''; return; }
      if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
        const m = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
        obj[col] = m ? new Date(+m[1], +m[2], +m[3]) : (cell.f || cell.v);
      } else {
        obj[col] = cell.v;
      }
    });
    return obj;
  });
}

// --- Data processing ---
let actuals = {}; // actuals[product][year][week] = cases
let grownLbDay = {}; // grownLbDay[category][week] = lb/day (2026 only)
let show25 = false;
let allCharts = [];

function processInvoices(rows) {
  actuals = {};
  rows.forEach(r => {
    const pc = r.ProductCode, yr = r.ISOYear, wk = r.ISOWeek, cases = r.Cases || 0;
    if (!pc || !yr || !wk) return;
    if (!actuals[pc]) actuals[pc] = {};
    if (!actuals[pc][yr]) actuals[pc][yr] = {};
    actuals[pc][yr][wk] = (actuals[pc][yr][wk] || 0) + cases;
  });
}

function processGrow(cukeRows, lettuceRows) {
  grownLbDay = {};
  Object.keys(CATEGORIES).forEach(c => { grownLbDay[c] = {}; });

  function toDate(v) {
    if (v instanceof Date) return v;
    if (typeof v === 'string') { const d = new Date(v); return isNaN(d) ? null : d; }
    return null;
  }

  // Cucumber harvest: variety (K/J/E), grade 1 only, greenhousenetweight
  cukeRows.forEach(r => {
    const grade = String(r.grade || '');
    if (grade !== '1') return;
    const variety = (r.variety || '').charAt(0).toUpperCase();
    const cat = VARIETY_TO_CAT[variety];
    if (!cat || !CATEGORIES[cat]) return;
    const hd = toDate(r.harvestdate);
    if (!hd) return;
    if (hd.getFullYear() !== 2026) return;
    const lb = parseFloat(r.greenhousenetweight) || 0;
    if (lb <= 0) return;
    const wk = fridayISOWeek(hd).week;
    grownLbDay[cat][wk] = (grownLbDay[cat][wk] || 0) + lb;
  });

  // Lettuce: variety GA=Arugula, WC=Watercress, else Lettuce, greenhousenetweight
  lettuceRows.forEach(r => {
    const hd = toDate(r.harvestdate);
    if (!hd) return;
    if (hd.getFullYear() !== 2026) return;
    const lb = parseFloat(r.greenhousenetweight) || 0;
    if (lb <= 0) return;
    const v = (r.variety || '').toUpperCase();
    const cat = v === 'GA' ? 'Arugula' : v === 'WC' ? 'Watercress' : 'Lettuce';
    const wk = fridayISOWeek(hd).week;
    grownLbDay[cat][wk] = (grownLbDay[cat][wk] || 0) + lb;
  });

  // Convert weekly totals to lb/day (÷7)
  Object.keys(grownLbDay).forEach(cat => {
    Object.keys(grownLbDay[cat]).forEach(wk => {
      grownLbDay[cat][wk] = Math.round(grownLbDay[cat][wk] / 7);
    });
  });
}

// --- Chart rendering ---
// Skip week 1 (Jan 1-2, holiday short week) — start at week 2
const WEEKS = Array.from({length:51}, (_,i) => i+2);
const LABELS = WEEKS.map(w => w);

// Shared legend config: fade hidden items instead of strikethrough
const LEGEND_CFG = {
  labels: {
    color:'#888', font:{size:10}, usePointStyle:true, pointStyle:'circle', padding:8,
    generateLabels(chart) {
      return Chart.defaults.plugins.legend.labels.generateLabels(chart).map(label => {
        if (label.hidden) label.fontColor = 'rgba(136,136,136,0.3)';
        label.text = label.text; // no strikethrough
        return label;
      });
    }
  }
};

function getBdg(codes, w) { return codes.reduce((s,c) => s + (BUDGET[c]?.[w-1] || 0), 0); }
function getAct(codes, yr, w) { return codes.reduce((s,c) => s + (actuals[c]?.[yr]?.[w] || 0), 0); }
function cumulate(arr) { let s = 0; return arr.map(v => { s += (v||0); return s; }); }

function getSoldLbDay(codes, w) {
  return Math.round(codes.reduce((s,c) => s + (actuals[c]?.[2026]?.[w] || 0) * (LB_PER_CASE[c]||0), 0) / 7);
}
function getGrownLbDay(codes, w) {
  // Aggregate grow data for all categories that these codes belong to
  const cats = [...new Set(codes.map(c => CODE_TO_CAT[c]).filter(Boolean))];
  return cats.reduce((s, cat) => s + (grownLbDay[cat]?.[w] || 0), 0);
}

function renderCasesChart(canvas, title, codes) {
  const bdg = WEEKS.map(w => getBdg(codes, w));
  const a26 = WEEKS.map(w => getAct(codes, 2026, w));
  const a25 = WEEKS.map(w => getAct(codes, 2025, w));
  const cumBdg = cumulate(bdg);
  const cumA26 = cumulate(a26);
  const a26d = a26.map((v,i) => i < MAX_WEEK ? v : null);
  const cumA26d = cumA26.map((v,i) => i < MAX_WEEK ? v : null);
  const soldLb = WEEKS.map(w => w <= MAX_WEEK ? getSoldLbDay(codes, w) : null);
  const grownLb = WEEKS.map(w => w <= MAX_WEEK ? getGrownLbDay(codes, w) : null);
  const showCum = rightMode === 'cum', showLb = rightMode === 'lb';

  return new Chart(canvas, {
    type: 'line',
    data: { labels: LABELS, datasets: [
      { label:'Bdg26', data:bdg, borderColor:'#ff0000', backgroundColor:'#ff0000', borderWidth:1.5, stepped:'before', pointRadius:0, yAxisID:'y' },
      { label:'Act26', data:a26d, borderColor:'#0066ff', backgroundColor:'#0066ff', borderWidth:2, pointRadius:0, yAxisID:'y', spanGaps:false },
      { label:'Act25', data:a25, borderColor:'rgba(0,204,0,0.5)', backgroundColor:'rgba(0,204,0,0.5)', borderWidth:1.5, pointRadius:0, yAxisID:'y', hidden:!show25, year:2025 },
      { label:'Cum Bdg', data:cumBdg, borderColor:'#cc4444', backgroundColor:'#cc4444', borderWidth:1.5, pointRadius:0, yAxisID:'y1', hidden:!showCum, rGroup:'cum' },
      { label:'Cum Act26', data:cumA26d, borderColor:'#4488cc', backgroundColor:'#4488cc', borderWidth:1.5, pointRadius:0, yAxisID:'y1', spanGaps:false, hidden:!showCum, rGroup:'cum' },
      // { label:'Grown lb/d', data:grownLb, borderColor:'#00cc00', backgroundColor:'#00cc00', borderWidth:1.5, pointRadius:0, yAxisID:'y1', spanGaps:false, hidden:!showLb, rGroup:'lb' },
      // { label:'Sold lb/d', data:soldLb, borderColor:'#ff9900', backgroundColor:'#ff9900', borderWidth:1.5, pointRadius:0, yAxisID:'y1', spanGaps:false, hidden:!showLb, rGroup:'lb' },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        title:{ display:true, text:title, color:'#aaa', font:{size:12} },
        legend: LEGEND_CFG
      },
      scales: {
        x:{ ticks:{color:'#888',font:{size:11},maxTicksLimit:13}, grid:{color:'rgba(255,255,255,0.05)'} },
        y:{ position:'left', ticks:{color:'#888',font:{size:11}}, grid:{color:'rgba(255,255,255,0.05)'}, grace:'10%' },
        y1:{ position:'right', ticks:{color:'#888',font:{size:11}}, grid:{drawOnChartArea:false}, grace:'10%' }
      }
    }
  });
}

function renderLbDayChart(canvas, title, catName) {
  const codes = CATEGORIES[catName];
  const sold = WEEKS.map(w => {
    const lb = codes.reduce((s,c) => s + (actuals[c]?.[2026]?.[w] || 0) * (LB_PER_CASE[c]||0), 0);
    return w <= MAX_WEEK ? Math.round(lb / 7) : null;
  });
  const grown = WEEKS.map(w => w <= MAX_WEEK ? (grownLbDay[catName]?.[w] || 0) : null);
  const diff = WEEKS.map((w,i) => {
    if (grown[i] == null || sold[i] == null) return null;
    return grown[i] - sold[i];
  });

  return new Chart(canvas, {
    type: 'line',
    data: { labels: LABELS, datasets: [
      { label:'Grown26', data:grown, borderColor:'#00cc00', backgroundColor:'#00cc00', borderWidth:2, pointRadius:0, spanGaps:false },
      { label:'Sold26', data:sold, borderColor:'#0066ff', backgroundColor:'#0066ff', borderWidth:2, pointRadius:0, spanGaps:false },
      { label:'Diff (G-S)', type:'bar', data:diff, backgroundColor:'rgba(255,204,0,0.4)', borderWidth:0, yAxisID:'y1', order:1 },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        title:{ display:true, text:title, color:'#aaa', font:{size:12} },
        legend: LEGEND_CFG
      },
      scales: {
        x:{ ticks:{color:'#888',font:{size:11},maxTicksLimit:13}, grid:{color:'rgba(255,255,255,0.05)'} },
        y:{ position:'left', ticks:{color:'#888',font:{size:11}}, grid:{color:'rgba(255,255,255,0.05)'}, grace:'10%' },
        y1:{ position:'right', ticks:{color:'#888',font:{size:11}}, grid:{drawOnChartArea:false}, title:{display:true, text:'Diff', color:'#666', font:{size:10}} }
      }
    }
  });
}

async function renderAll() {
  allCharts.forEach(c => c.destroy());
  allCharts = [];

  const tasks = [];
  PRODUCTS.forEach(code => tasks.push(() => {
    allCharts.push(renderCasesChart(document.getElementById('prod_'+code), code+' Cases', [code]));
  }));
  Object.keys(CATEGORIES).forEach(cat => tasks.push(() => {
    allCharts.push(renderLbDayChart(document.getElementById('lb_'+cat), cat+' lb/day', cat));
  }));
  SUMMARY_CHARTS.forEach(s => tasks.push(() => {
    allCharts.push(renderCasesChart(document.getElementById('sum_'+s.codes[0]), s.title, s.codes));
  }));

  // Render in batches to avoid blocking UI
  for (let i = 0; i < tasks.length; i++) {
    tasks[i]();
    if (i % 4 === 3) await new Promise(r => setTimeout(r, 0));
  }
}

function toggle25() {
  show25 = !show25;
  const btn = document.getElementById('toggleAct25');
  btn.textContent = show25 ? "Hide '25" : "Show '25";
  btn.style.borderColor = show25 ? '#4ecca3' : '#555';
  allCharts.forEach(chart => {
    chart.data.datasets.forEach((ds, i) => {
      if (ds.year === 2025) chart.setDatasetVisibility(i, show25);
    });
    chart.update();
  });
}

let rightMode = 'cum'; // 'off', 'cum', 'lb'
function cycleRightAxis() {
  const modes = ['off','cum','lb'];
  rightMode = modes[(modes.indexOf(rightMode) + 1) % 3];
  const btn = document.getElementById('toggleRight');
  const labels = { off:'Right: Off', cum:'Right: Cum', lb:'Right: lb/d' };
  btn.textContent = labels[rightMode];
  btn.style.borderColor = rightMode === 'off' ? '#555' : '#4ecca3';
  allCharts.forEach(chart => {
    chart.data.datasets.forEach((ds, i) => {
      if (ds.rGroup === 'cum') chart.setDatasetVisibility(i, rightMode === 'cum');
      if (ds.rGroup === 'lb') chart.setDatasetVisibility(i, rightMode === 'lb');
    });
    chart.update();
  });
}

// --- Caching (localStorage, 24hr expiry) ---
const CACHE_KEY = 'budget_data_cache';
const CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours

function getCached() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (Date.now() - cached.ts > CACHE_TTL) { localStorage.removeItem(CACHE_KEY); return null; }
    return cached;
  } catch(e) { return null; }
}
function setCache(invoices, cukeGrow, lettuceGrow) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), invoices, cukeGrow, lettuceGrow }));
  } catch(e) {}
}

function setProgress(pct, text) {
  document.getElementById('loadBar').style.width = pct + '%';
  if (text) document.getElementById('loadText').textContent = text;
}

// --- Init ---
async function loadData() {
  try {
    const cached = getCached();
    let invoiceRows, cukeRows, lettuceRows;

    if (cached) {
      setProgress(80, 'Using cached data...');
      invoiceRows = cached.invoices;
      cukeRows = cached.cukeGrow || [];
      lettuceRows = cached.lettuceGrow || [];
    } else {
      setProgress(10, 'Fetching invoice data...');
      const [inv1, inv2] = await Promise.all(SALES_GIDS.map(g => fetchSalesTab(g)));
      invoiceRows = [...inv1, ...inv2];
      setProgress(50, 'Fetching grow data...');
      try {
        const [cuke, lett] = await Promise.all(GROW_TABS.map(t => fetchGrowTab(t)));
        cukeRows = cuke; lettuceRows = lett;
      } catch(e) { console.warn('Grow data unavailable:', e); cukeRows = []; lettuceRows = []; }
      setProgress(70, 'Caching data...');
      setCache(invoiceRows, cukeRows, lettuceRows);
    }

    setProgress(80, 'Processing...');
    processInvoices(invoiceRows);
    processGrow(cukeRows, lettuceRows);

    // Build DOM
    createProductRows();
    createChartBoxes('lbdayGrid', Object.keys(CATEGORIES).map(c => ({id:'lb_'+c})));
    createChartBoxes('summaryGrid', SUMMARY_CHARTS.map(s => ({id:'sum_'+s.codes[0]})));

    setProgress(90, 'Rendering charts...');
    document.getElementById('main').style.display = 'block';
    await renderAll();

    document.getElementById('loading').style.display = 'none';
    const src = cached ? '(cached)' : '(live)';
    document.getElementById('status').textContent = `YTD through week ${MAX_WEEK} ${src}`;
  } catch(e) {
    document.getElementById('loadText').textContent = 'Error: ' + e;
    console.error(e);
  }
}

loadData();
</script>
