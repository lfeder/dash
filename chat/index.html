<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm AI Chat</title>
<!-- v: 03-17 17:45 -->
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#header { background: #16213e; padding: 8px 20px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#header h1 { font-size: 1.1rem; color: #4ecca3; }
#header .stats { font-size: 0.7rem; color: #888; display: flex; gap: 16px; }

/* Chat area */
#chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; line-height: 1.5; }
.msg-user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 2px; }
.msg-ai { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 2px; }
.msg-error { align-self: flex-start; background: #2a1a1a; border: 1px solid #e74c3c; color: #e74c3c; }
.msg-status { align-self: center; color: #888; font-size: 0.75rem; }
#loading-status { display: flex; align-items: center; justify-content: center; flex: 1; font-size: 1.1rem; color: #4ecca3; flex-direction: column; gap: 8px; }
#loading-status .sub { font-size: 0.75rem; color: #888; }
.msg-code { font-size: 0.7rem; margin-top: 8px; padding: 8px; background: #1a1a2e; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; font-family: 'Consolas', 'Monaco', monospace; color: #aaa; }
.msg-code summary { color: #888; font-size: 0.65rem; cursor: pointer; }
.msg-cost { font-size: 0.6rem; color: #555; margin-top: 4px; }
.result-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.75rem; }
.result-table th { text-align: left; padding: 4px 8px; border-bottom: 2px solid #0f3460; color: #4ecca3; background: #16213e; position: sticky; top: 0; }
.result-table td { padding: 3px 8px; border-bottom: 1px solid #0f3460; }
.result-table th.num, .result-table td.num { text-align: right; }

/* Input */
#input-area { padding: 10px 16px; border-top: 1px solid #0f3460; display: flex; gap: 8px; flex-shrink: 0; }
#question { flex: 1; background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; font-family: inherit; outline: none; }
#question:focus { border-color: #4ecca3; }
#question::placeholder { color: #555; }
.btn-primary { padding: 6px 16px; font-size: 0.85rem; background: #4ecca3; color: #1a1a2e; border: 1px solid #4ecca3; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.15s; }
.btn-primary:hover { background: #3dbb94; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

/* Examples */
.examples { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 8px; }
.example-btn { padding: 4px 10px; font-size: 0.7rem; background: #0f3460; color: #aaa; border: 1px solid transparent; border-radius: 12px; cursor: pointer; transition: all 0.15s; }
.example-btn:hover { color: #e0e0e0; border-color: #4ecca3; }
</style>
</head>
<body>

<div id="header">
  <h1>Farm AI</h1>
  <div class="stats">
    <span id="stat-tables"></span>
    <span id="stat-rows"></span>
    <span id="stat-cost"></span>
  </div>
</div>

<div id="chat-wrap">
  <div id="loading-status">Loading data from Google Sheets...<div class="sub" id="loading-tab"></div></div>
  <div id="messages" style="display:none"></div>
  <div class="examples" id="examples">
    <button class="example-btn" onclick="askExample(this)">What tables are loaded?</button>
    <button class="example-btn" onclick="askExample(this)">How many rows per table?</button>
    <button class="example-btn" onclick="askExample(this)">List all columns in each table</button>
  </div>
  <div id="input-area">
    <input type="text" id="question" placeholder="Ask a question about your farm data..." disabled />
    <button class="btn-primary" id="ask-btn" onclick="ask()" disabled>Ask</button>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────
const SHEETS = {
  grow:  { id: '1VtEecYn-W1pbnIU1hRHfxIpkH2DtK7hj0CpcpiLoziM', tabs: ['grow_C_seeding', 'grow_C_harvest', 'grow_L_seeding', 'grow_spray_sched'] },
  fsafe: { id: '1MbHJoJmq0w8hWz8rl9VXezmK-63MFmuK19lz3pu0dfc', tabs: ['fsafe_log_list', 'fsafe_log_corrective_action', 'fsafe_corrective_actions', 'fsafe_test_name', 'fsafe_site_name', 'fsafe_log_emp', 'fsafe_log_water', 'fsafe_log_test_n_hold', 'fsafe_log_test_n_hold_APC', 'fsafe_log_training', 'fsafe_log_training_employees', 'fsafe_log_C_gh_pre', 'fsafe_log_C_gh_post', 'fsafe_log_C_ph_pre', 'fsafe_log_C_ph_post', 'fsafe_log_L_gh_pre', 'fsafe_log_L_gh_post', 'fsafe_log_L_ph_pre', 'fsafe_log_L_ph_post', 'fsafe_log_pest', 'fsafe_log_pest_stations', 'fsafe_log_glass', 'fsafe_log_calibration', 'fsafe_log_visitors'] },
  // maint: { id: '1e7AuQAOpKAHpmvizIgBNyUk42GscXNpz96hFX8C8uio', tabs: ['maint_req', 'maint_house_inspections', 'maint_houses', 'maint_sites'] }
};

const _k = ['c2stYW50LWFwaTAzLWFIYjAteVhXQ','21HMU9kNTVGTmZ6MnltNGFyS1hmTX','ZvMG9hY1otdThvbnFsM0VxVWJvLU8','2YzdRM0NOWEdoSEx4YXFBeW4ycUhP','SjU3d0xyZGdZNFlnLUx6UWJGUUFB'];
const API_KEY = atob(_k.join(''));

// ── State ───────────────────────────────────────────────
const data = {};
let totalCost = 0;
let queryCount = 0;

// ── gviz data loading ───────────────────────────────────
function parseGvizTable(table) {
  const cols = table.cols.map(c => c.label || c.id);
  return table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      if (!cell) { obj[cols[i]] = ''; return; }
      // Use formatted value for dates (gviz dates are strings like "Date(2024,1,25)" which JS can't parse)
      if (typeof cell.v === 'string' && cell.v.startsWith('Date(') && cell.f) {
        obj[cols[i]] = cell.f;
      } else {
        obj[cols[i]] = cell.v != null ? cell.v : '';
      }
    });
    return obj;
  });
}

function fetchTab(sheetId, sheetName) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Math.random().toString(36).slice(2, 10);
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${cbName}&sheet=${encodeURIComponent(sheetName)}`;
    window[cbName] = function(resp) {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (resp.status === 'error') { reject(sheetName + ': ' + JSON.stringify(resp.errors)); return; }
      resolve(parseGvizTable(resp.table));
    };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => { delete window[cbName]; script.remove(); reject('Network error: ' + sheetName); };
    document.head.appendChild(script);
  });
}

async function loadAllData() {
  const statusEl = document.getElementById('question');
  let loaded = 0;
  let failed = 0;
  const errors = [];

  // Build flat tab list
  const tabList = [];
  for (const [key, info] of Object.entries(SHEETS)) {
    for (const tab of info.tabs) {
      tabList.push({ sheetId: info.id, tabName: tab });
    }
  }

  const loadingTab = document.getElementById('loading-tab');
  for (const tab of tabList) {
    loadingTab.textContent = `${tab.tabName} (${loaded + failed + 1}/${tabList.length})`;
    try {
      const rows = await fetchTab(tab.sheetId, tab.tabName);
      if (rows.length > 0) {
        data[tab.tabName] = rows;
      }
      loaded++;
    } catch (e) {
      failed++;
      errors.push(String(e));
      console.warn('Failed:', e);
    }
  }

  document.getElementById('loading-status').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';

  if (Object.keys(data).length > 0) {
    statusEl.disabled = false;
    document.getElementById('ask-btn').disabled = false;
    addMessage('status', `Loaded ${Object.keys(data).length} tables, ${Object.values(data).reduce((s,r) => s + r.length, 0).toLocaleString()} rows` + (failed ? ` (${failed} failed)` : ''));
  } else {
    addMessage('error', 'Failed to load any data. Errors: ' + errors.join('; '));
  }

  updateStats();
}

// ── Schema ──────────────────────────────────────────────
function getSchema() {
  let schema = '';
  for (const [name, rows] of Object.entries(data)) {
    const cols = Object.keys(rows[0] || {});
    schema += `\nTable: ${name} (${rows.length} rows)\nColumns:\n`;
    for (const col of cols) {
      const samples = rows.slice(0, 2).map(r => r[col]).filter(v => v !== '');
      schema += `  - ${col}: ${JSON.stringify(samples)}\n`;
    }
  }
  return schema;
}

// ── Claude API ──────────────────────────────────────────
async function callClaude(question) {
  const schema = getSchema();
  const prompt = `You have these JavaScript data arrays in an object called \`data\`:
${schema}
Access data like: data['grow_C_seeding'], data['maint_req'], etc.
Each entry is an array of objects (rows).
Date fields are strings in "M/d/yyyy" format (e.g. "2/25/2024"). Parse with new Date(dateString).

Question: ${question}

Write ONLY executable JavaScript code. Store the answer in \`result\`.
- result can be: a string, a number, an array of objects (for tables), or an object
- For array-of-objects results, include only relevant columns
- Use standard JS array methods (filter, map, reduce, sort, etc.)
- NO console.log, NO comments, NO explanations, NO markdown, NO text before or after the code
- Output MUST be a single valid JavaScript code block and nothing else`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }

  const json = await resp.json();
  const inputTokens = json.usage.input_tokens;
  const outputTokens = json.usage.output_tokens;
  const cost = (inputTokens * 3 / 1e6) + (outputTokens * 15 / 1e6);

  let code = json.content[0].text;
  code = code.replace(/```javascript\n?/g, '').replace(/```js\n?/g, '').replace(/```\n?/g, '');
  // Strip any non-code text before first valid JS and after last semicolon/brace
  const lines = code.split('\n');
  const codeLines = lines.filter(l => !l.match(/^(Wait|Let me|Actually|Looking|Here|Note|The |I |This )/));
  code = codeLines.join('\n');

  return { code: code.trim(), inputTokens, outputTokens, cost };
}

// ── Execute + display ───────────────────────────────────
function executeCode(code) {
  const fn = new Function('data', code + '\nreturn result;');
  return fn(data);
}

function formatResult(result) {
  if (result == null) return '<em>No result</em>';
  if (typeof result === 'string' || typeof result === 'number') return String(result);
  if (Array.isArray(result) && result.length > 0 && typeof result[0] === 'object') {
    return renderTable(result);
  }
  if (Array.isArray(result)) return result.join(', ');
  if (typeof result === 'object') {
    return renderTable(Object.entries(result).map(([k, v]) => ({ Key: k, Value: v })));
  }
  return String(result);
}

function renderTable(rows) {
  if (rows.length === 0) return '<em>Empty result</em>';
  const cols = Object.keys(rows[0]);
  const isNum = col => rows.some(r => typeof r[col] === 'number');
  let html = '<table class="result-table"><thead><tr>';
  for (const c of cols) html += `<th${isNum(c) ? ' class="num"' : ''}>${c}</th>`;
  html += '</tr></thead><tbody>';
  for (const row of rows.slice(0, 200)) {
    html += '<tr>';
    for (const c of cols) {
      const v = row[c];
      const display = typeof v === 'number' ? (Number.isInteger(v) ? v : v.toFixed(1)) : (v ?? '');
      html += `<td${isNum(c) ? ' class="num"' : ''}>${display}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  if (rows.length > 200) html += `<div style="font-size:0.65rem;color:#888;margin-top:4px">Showing 200 of ${rows.length} rows</div>`;
  return html;
}

// ── Chat UI ─────────────────────────────────────────────
function addMessage(role, html, extra) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  div.innerHTML = html;
  if (extra) div.innerHTML += extra;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function askExample(btn) {
  if (document.getElementById('question').disabled) return;
  document.getElementById('question').value = btn.textContent;
  ask();
}

async function ask() {
  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;
  if (Object.keys(data).length === 0) { addMessage('error', 'Data not loaded yet'); return; }

  input.value = '';
  addMessage('user', question);
  document.getElementById('examples').style.display = 'none';

  const thinking = document.createElement('div');
  thinking.className = 'msg msg-ai';
  thinking.textContent = 'Thinking...';
  thinking.style.color = '#888';
  document.getElementById('messages').appendChild(thinking);

  try {
    const { code, inputTokens, outputTokens, cost } = await callClaude(question);
    totalCost += cost;
    queryCount++;

    let resultHtml;
    try {
      const result = executeCode(code);
      resultHtml = formatResult(result);
    } catch (execErr) {
      resultHtml = `<span style="color:#e74c3c">Code error: ${execErr.message}</span>`;
    }

    const codeBlock = `<details class="msg-code"><summary>code</summary>${code.replace(/</g, '&lt;')}</details>`;
    const costLine = `<div class="msg-cost">${inputTokens.toLocaleString()} in / ${outputTokens.toLocaleString()} out · $${cost.toFixed(4)}</div>`;

    thinking.remove();
    addMessage('ai', resultHtml, codeBlock + costLine);
    updateStats();
  } catch (err) {
    thinking.remove();
    addMessage('error', err.message);
  }
}

function updateStats() {
  const tables = Object.keys(data).length;
  const rows = Object.values(data).reduce((s, r) => s + r.length, 0);
  document.getElementById('stat-tables').textContent = tables ? `${tables} tables` : '';
  document.getElementById('stat-rows').textContent = rows ? `${rows.toLocaleString()} rows` : '';
  document.getElementById('stat-cost').textContent = queryCount ? `$${totalCost.toFixed(4)}` : '';
}

// ── Enter key ───────────────────────────────────────────
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
});

// ── Auto-load on page open ──────────────────────────────
loadAllData();
</script>
</body>
</html>
