<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staffing</title>
<script src="../lib/data-source.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#1a1a2e; color:#e0e0e0; }
#header { background:#16213e; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #0f3460; position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:8px; }
#header h1 { font-size:1.2rem; color:#4ecca3; }
.controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.toggle-group { display:flex; gap:0; border:1px solid #2a3a5e; border-radius:4px; overflow:hidden; }
.toggle-group button { padding:4px 10px; font-size:0.75rem; background:#16213e; color:#aaa; border:none; cursor:pointer; }
.toggle-group button.active { background:#0f3460; color:#4ecca3; }
.btn { padding:4px 10px; font-size:0.75rem; background:#0f3460; color:#ccc; border:1px solid #555; border-radius:4px; cursor:pointer; }
.btn.primary { color:#4ecca3; border-color:#4ecca3; }
#chips { display:flex; gap:6px; padding:8px 20px; background:#101828; border-bottom:1px solid #0f3460; flex-wrap:wrap; }
.chip { padding:6px 10px; background:#16213e; border:1px solid #2a3a5e; border-radius:4px; font-size:0.75rem; display:flex; align-items:center; gap:6px; }
.chip .dot { width:8px; height:8px; border-radius:50%; }
.chip .lbl { color:#888; }
.chip .val { color:#e0e0e0; font-weight:600; }
.chip .delta { font-size:0.7rem; }
.delta.pos { color:#4ecca3; }
.delta.neg { color:#e74c3c; }
.delta.zero { color:#888; }
#main { padding:14px 20px 60px; }
#chartBox { background:#16213e; border:1px solid #2a3a5e; border-radius:6px; padding:10px; height:340px; margin-bottom:14px; }
#tableWrap { background:#16213e; border:1px solid #2a3a5e; border-radius:6px; overflow:auto; max-height:calc(100vh - 130px); }
table { width:100%; border-collapse:collapse; font-size:0.78rem; table-layout:fixed; }
th, td { padding:4px 8px; text-align:right; border-bottom:1px solid #0f3460; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
col.col-pp     { width:90px; }
col.col-data   { width:65px; }
col.col-tot    { width:120px; }
td.sec-end-25, td.sec-end-bdg, .sec-act:last-child,
th.sec-end-25, th.sec-end-bdg { overflow:visible; }
th { background:#0f3460; color:#aaa; font-weight:600; font-size:0.72rem; }
tr.totals td { background:#0d2a4f !important; font-weight:700; color:#fff; position:sticky; z-index:4; }
tr.totals.tr-full td { top:0; }
tr.totals.tr-ytd td  { top:26px; border-bottom:2px solid #4ecca3; }
thead tr.hdr-section th { position:sticky; top:54px; z-index:3; background:#0a2440; font-size:0.78rem; text-align:center; }
thead tr.hdr-cols    th { position:sticky; top:82px; z-index:3; text-align:right; }
th:first-child, td:first-child { text-align:left; padding-left:12px; position:sticky; left:0; background:#0f3460; z-index:1; }
tr.totals td:first-child { background:#0d2a4f !important; z-index:4; color:#fff; font-weight:700; }
td:first-child { background:#16213e; color:#e0e0e0; font-weight:600; }
.sec-25  { background:rgba(135,135,135,0.05); }
.sec-bdg { background:rgba(155,89,182,0.06); }
.sec-act { background:rgba(78,204,163,0.05); }
th.sec-25  { background:#0a2a3a; color:#bbb; }
th.sec-bdg { background:#241834; color:#c7a3e0; }
th.sec-act { background:#0a3525; color:#9bdfc4; }
.sec-end-25, .sec-end-bdg { border-right:2px solid #2a3a5e; }
tr.future td.sec-act { color:#444; }
tr:hover td:not(.totals) { filter:brightness(1.15); }
.cell-val { color:#e0e0e0; }
.cell-bdg { color:#666; font-size:0.7rem; }
.cell-delta { font-size:0.7rem; margin-left:4px; }
.cell-edit { background:#0a1c3a !important; padding:2px 4px; }
input.bdg-input { width:55px; background:#0a1c3a; color:#e0e0e0; border:1px solid #4ecca3; border-radius:3px; padding:2px 4px; text-align:right; font-size:0.78rem; font-family:inherit; }
input.bdg-input:focus { outline:none; border-color:#fff; background:#1c2a4a; }
.future { opacity:0.85; }
#status { font-size:0.7rem; color:#888; }
#issue { padding:6px 14px; background:#3a2a1a; color:#e8b87a; font-size:0.72rem; border-bottom:1px solid #5a3a1a; display:none; }
</style>
</head>
<body>

<div id="header">
  <h1>Staffing</h1>
  <div class="controls">
    <div class="toggle-group" id="metricToggle">
      <button data-metric="headcount" class="active">Headcount</button>
      <button data-metric="hours">Hours</button>
      <button data-metric="cost_total">Total Cost</button>
    </div>
    <select id="versionSel" class="btn" title="Budget version" style="cursor:pointer"></select>
    <button id="editBtn" class="btn">Edit Budget</button>
    <button id="saveBtn" class="btn primary" style="display:none">Save Budget</button>
    <span id="status">Loading…</span>
    <span id="version" style="font-size:0.7rem;color:#e0e0e0"></span>
  </div>
</div>

<div id="main">
  <div id="tableWrap"><table id="grid"></table></div>
</div>

<script>
// ========= Constants =========
const LABOR = ['local','wfe','h2a','f_local','fuerte'];
const LABOR_LABEL = { local:'Local', wfe:'WFE', h2a:'H2A', f_local:'F(local)', fuerte:'Fuerte' };
const LABOR_COLOR = { local:'#4ecca3', wfe:'#3498db', h2a:'#f39c12', f_local:'#9b59b6', fuerte:'#e74c3c' };
const AUTH_TO_LABOR = {
  'Local':'local', 'WFE':'wfe', 'H2A':'h2a', 'FUERTE (Local)':'f_local', 'FUERTE':'fuerte'
};
const PP_COUNT = 26;

// ========= State =========
let state = {
  metric: 'headcount',
  editMode: false,
  budgetDirty: false,
};
let budgets = { 2026: null }; // 2025 has no budget; 2026 = expanded selected version
let budgetVersionsRaw = {}; // raw {versionDate: sparseObj} loaded from JSON
let activeVersion = null;   // string date of the currently selected version
let actuals = { 2025: null, 2026: null }; // [pp][labor] = {headcount, hours, cost_total, cost_gross}
let ppDates = { 2025: [], 2026: [] }; // [pp-1] = check_date string
let currentPP = { 2025: 26, 2026: 1 };

// ========= Loaders =========
async function loadBudget() {
  const r = await fetch('hr_budgets_2026.json?t=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('hr_budgets_2026.json missing');
  const j = await r.json();
  budgetVersionsRaw = j.versions || {};
  // Pick latest version by date
  const dates = Object.keys(budgetVersionsRaw).sort();
  if (!dates.length) throw new Error('no budget versions in file');
  activeVersion = dates[dates.length - 1];
  applyActiveVersion();
}

function applyActiveVersion() {
  const sparse = budgetVersionsRaw[activeVersion] || {};
  const expanded = {};
  let last = null;
  for (let pp = 1; pp <= PP_COUNT; pp++) {
    if (sparse[String(pp)]) last = sparse[String(pp)];
    if (last) expanded[pp] = { ...last };
  }
  budgets[2026] = expanded;
}

function renderVersionDropdown() {
  const sel = document.getElementById('versionSel');
  const dates = Object.keys(budgetVersionsRaw).sort();
  sel.innerHTML = dates.map(d => {
    const isLatest = d === dates[dates.length - 1];
    return `<option value="${d}"${d === activeVersion ? ' selected' : ''}>${d}${isLatest ? ' (latest)' : ''}</option>`;
  }).join('');
}

async function loadActuals() {
  const client = await DataSource.getClient();
  const { data, error } = await client
    .from('hr_staffing_pp_v')
    .select('*')
    .gte('year', 2025);
  if (error) throw error;
  // Group rows: actuals[year][pp][labor] = {headcount, hours, cost_total, cost_gross}
  const ppDateByYear = { 2025: new Map(), 2026: new Map() };
  for (const r of data) {
    if (!actuals[r.year]) actuals[r.year] = {};
    if (!actuals[r.year][r.pp]) actuals[r.year][r.pp] = {};
    actuals[r.year][r.pp][r.labor_type] = {
      headcount: r.headcount,
      hours: parseFloat(r.hours) || 0,
      cost_total: parseFloat(r.cost_total) || 0,
      cost_gross: parseFloat(r.cost_gross) || 0,
    };
    if (ppDateByYear[r.year]) ppDateByYear[r.year].set(r.pp, r.check_date);
  }
  for (const yr of [2025, 2026]) {
    const maxPP = Math.max(0, ...ppDateByYear[yr].keys());
    ppDates[yr] = [];
    for (let pp = 1; pp <= maxPP; pp++) ppDates[yr].push(ppDateByYear[yr].get(pp) || '');
    currentPP[yr] = maxPP;
    // Backfill any (pp, labor) cells the view didn't return so lookups don't crash
    for (let pp = 1; pp <= maxPP; pp++) {
      if (!actuals[yr][pp]) actuals[yr][pp] = {};
      for (const labor of LABOR) {
        if (!actuals[yr][pp][labor]) {
          actuals[yr][pp][labor] = { headcount:0, hours:0, cost_total:0, cost_gross:0 };
        }
      }
    }
  }
}

// ========= Forecast rates (2026 only) =========
// Per-labor-type avg $/hr and avg hours/headcount/PP, derived from 2026 actuals
let rates = {}; // rates[labor] = {dollar_per_hour_total, dollar_per_hour_gross, hours_per_head_pp}
function computeRates() {
  rates = {};
  if (!actuals[2026]) return;
  for (const labor of LABOR) {
    let h = 0, ct = 0, cg = 0, hcSum = 0, ppCount = 0;
    for (let pp = 1; pp <= currentPP[2026]; pp++) {
      const a = actuals[2026][pp]?.[labor];
      if (!a) continue;
      h  += a.hours;
      ct += a.cost_total;
      cg += a.cost_gross;
      hcSum += a.headcount;
      ppCount++;
    }
    rates[labor] = {
      dollar_per_hour_total: h > 0 ? ct / h : 0,
      dollar_per_hour_gross: h > 0 ? cg / h : 0,
      hours_per_head_pp: (ppCount > 0 && hcSum > 0) ? h / hcSum : 0,
    };
  }
}

// ========= Value lookups =========
function getActual(year, pp, labor) {
  return actuals[year]?.[pp]?.[labor] || null;
}
function getBudgetHC(year, pp, labor) {
  return budgets[year]?.[pp]?.[labor] ?? null;
}
function metricValue(year, pp, labor, isFuture) {
  const m = state.metric;
  const a = getActual(year, pp, labor);
  const bHC = getBudgetHC(year, pp, labor);
  if (!isFuture && a) {
    if (m === 'headcount')  return a.headcount;
    if (m === 'hours')      return a.hours;
    if (m === 'cost_total') return a.cost_total;
    if (m === 'cost_gross') return a.cost_gross;
  }
  if (year !== 2026 || bHC == null) return null;
  if (m === 'headcount')  return bHC;
  const r = rates[labor];
  if (!r) return null;
  const fHours = bHC * r.hours_per_head_pp;
  if (m === 'hours')      return fHours;
  if (m === 'cost_total') return fHours * r.dollar_per_hour_total;
  if (m === 'cost_gross') return fHours * r.dollar_per_hour_gross;
  return null;
}
function budgetValue(year, pp, labor) {
  if (year !== 2026) return null;
  const bHC = getBudgetHC(year, pp, labor);
  if (bHC == null) return null;
  const m = state.metric;
  if (m === 'headcount')  return bHC;
  const r = rates[labor];
  if (!r) return null;
  const fHours = bHC * r.hours_per_head_pp;
  if (m === 'hours')      return fHours;
  if (m === 'cost_total') return fHours * r.dollar_per_hour_total;
  if (m === 'cost_gross') return fHours * r.dollar_per_hour_gross;
  return null;
}

// ========= Formatting =========
function fmt(v) {
  if (v == null) return '';
  if (state.metric === 'headcount') return Math.round(v).toString();
  if (state.metric === 'hours')     return Math.round(v).toLocaleString();
  // cost
  if (Math.abs(v) >= 1000) return '$' + Math.round(v / 1000).toLocaleString() + 'k';
  return '$' + Math.round(v).toLocaleString();
}
function fmtDelta(v) {
  if (v == null || isNaN(v)) return '';
  const sign = v > 0 ? '+' : '';
  if (state.metric === 'headcount') return sign + Math.round(v);
  if (state.metric === 'hours')     return sign + Math.round(v).toLocaleString();
  if (Math.abs(v) >= 1000) return sign + '$' + Math.round(v / 1000).toLocaleString() + 'k';
  return sign + '$' + Math.round(v).toLocaleString();
}

// ========= Cell value helpers (year-agnostic) =========
function actualMetricVal(year, pp, labor) {
  const a = actuals[year]?.[pp]?.[labor];
  if (!a) return null;
  if (state.metric === 'headcount')  return a.headcount;
  if (state.metric === 'hours')      return a.hours;
  if (state.metric === 'cost_total') return a.cost_total;
  if (state.metric === 'cost_gross') return a.cost_gross;
  return null;
}
function budgetMetricVal(pp, labor) {
  const bHC = getBudgetHC(2026, pp, labor);
  if (bHC == null) return null;
  if (state.metric === 'headcount') return bHC;
  const r = rates[labor];
  if (!r) return null;
  const fHours = bHC * r.hours_per_head_pp;
  if (state.metric === 'hours')      return fHours;
  if (state.metric === 'cost_total') return fHours * r.dollar_per_hour_total;
  if (state.metric === 'cost_gross') return fHours * r.dollar_per_hour_gross;
  return null;
}

// ========= Combined PP table: 2025 act | 2026 bdg | 2026 act+Δ =========
function renderTable() {
  const isHC = state.metric === 'headcount';
  const Q = (s) => s; // identity, kept for readability

  function yrAgg(year, mode, ppMin, ppMax) {
    const perLabor = {}; for (const l of LABOR) perLabor[l] = { sum:0, count:0 };
    let totVal = 0, ppCount = 0;
    const lo = ppMin || 1;
    const hi = ppMax || PP_COUNT;
    for (let pp = lo; pp <= hi; pp++) {
      let ppHas = false, ppTot = 0;
      for (const l of LABOR) {
        const v = (mode === 'actual') ? actualMetricVal(year, pp, l) : budgetMetricVal(pp, l);
        if (v == null) continue;
        perLabor[l].sum += v; perLabor[l].count++;
        ppTot += v; ppHas = true;
      }
      if (ppHas) { totVal += ppTot; ppCount++; }
    }
    const out = { perLabor: {}, total: 0, pp_count: ppCount };
    for (const l of LABOR) {
      const c = perLabor[l].count;
      out.perLabor[l] = isHC ? (c ? perLabor[l].sum / c : 0) : perLabor[l].sum;
    }
    out.total = isHC ? (ppCount ? totVal / ppCount : 0) : totVal;
    return out;
  }

  const ppA = currentPP[2026];

  // Full year
  const tot25_full  = yrAgg(2025, 'actual');
  const totB26_full = yrAgg(2026, 'budget');
  // YTD (1..ppA)
  const tot25_ytd   = yrAgg(2025, 'actual', 1, ppA);
  const totB26_ytd  = yrAgg(2026, 'budget', 1, ppA);
  const totA26_ytd  = yrAgg(2026, 'actual', 1, ppA);

  function pctTag(actual, base) {
    if (base == null || base === 0 || actual == null) return '';
    const d = (actual - base) / base * 100;
    const sign = d > 0 ? '+' : '';
    const cls = d > 0 ? 'pos' : d < 0 ? 'neg' : 'zero';
    return ' <span class="delta ' + cls + '" style="font-size:0.7rem;font-weight:500">' + sign + Math.round(d) + '%</span>';
  }
  function totalsRow(label, cls, t25, tB, tA) {
    let row = '<tr class="totals ' + cls + '"><td>' + label + '</td>';
    // 2025: 5 blank labor cells + 1 Tot
    for (let i = 0; i < 5; i++) row += '<td class="sec-25"></td>';
    row += '<td class="sec-25 sec-end-25">' + (t25 ? fmt(t25.total) : '') + '</td>';
    // 2026 budget: 5 blank labor cells + Tot with +% vs 25
    for (let i = 0; i < 5; i++) row += '<td class="sec-bdg"></td>';
    const bdgPct = (tB && t25) ? pctTag(tB.total, t25.total) : '';
    row += '<td class="sec-bdg sec-end-bdg">' + (tB ? fmt(tB.total) : '') + bdgPct + '</td>';
    // 2026 actual: 5 blank labor cells + Tot with +% vs 26B
    for (let i = 0; i < 5; i++) row += '<td class="sec-act"></td>';
    const actPct = (tA && tB) ? pctTag(tA.total, tB.total) : '';
    row += '<td class="sec-act">' + (tA ? fmt(tA.total) + actPct : '') + '</td>';
    row += '</tr>';
    return row;
  }

  // Build the full HTML — totals rows live in thead so they sit ABOVE headers
  let html = '<colgroup><col class="col-pp">';
  // 3 sections of (5 labor + 1 Tot)
  for (let s = 0; s < 3; s++) {
    for (let i = 0; i < 5; i++) html += '<col class="col-data">';
    html += '<col class="col-tot">';
  }
  html += '</colgroup><thead>';
  html += totalsRow('Full year', 'tr-full', tot25_full, totB26_full, null);
  html += totalsRow('YTD',       'tr-ytd',  tot25_ytd,  totB26_ytd,  totA26_ytd);
  // Section header row
  html += '<tr class="hdr-section"><th rowspan="2"></th>';
  html += '<th class="sec-25" colspan="6">2025 Actual</th>';
  html += '<th class="sec-bdg" colspan="6">2026 Budget</th>';
  html += '<th class="sec-act" colspan="6">2026 Actual</th></tr>';
  // Column header row
  html += '<tr class="hdr-cols">';
  for (const l of LABOR) html += '<th class="sec-25">' + LABOR_LABEL[l] + '</th>';
  html += '<th class="sec-25 sec-end-25">Tot</th>';
  for (const l of LABOR) html += '<th class="sec-bdg">' + LABOR_LABEL[l] + '</th>';
  html += '<th class="sec-bdg sec-end-bdg">Tot</th>';
  for (const l of LABOR) html += '<th class="sec-act">' + LABOR_LABEL[l] + '</th>';
  html += '<th class="sec-act">Tot</th>';
  html += '</tr>';
  html += '</thead><tbody>';

  for (let pp = 1; pp <= PP_COUNT; pp++) {
    const date25 = ppDates[2025][pp - 1] || '';
    const date26 = ppDates[2026][pp - 1] || '';
    const isFuture26 = pp > currentPP[2026];
    const dateLbl = date26 ? date26.slice(5) : (date25 ? date25.slice(5) : '');
    html += '<tr class="' + (isFuture26 ? 'future' : '') + '" data-pp="' + pp + '"><td>' + pp;
    if (dateLbl) html += ' <span style="color:#bbb;font-size:0.7rem;font-weight:400">' + dateLbl + '</span>';
    html += '</td>';

    let tot25row = 0, any25 = false;
    for (const l of LABOR) {
      const v = actualMetricVal(2025, pp, l);
      if (v != null) { tot25row += v; any25 = true; }
      html += '<td class="sec-25">' + (v != null ? fmt(v) : '') + '</td>';
    }
    html += '<td class="sec-25 sec-end-25">' + (any25 ? fmt(tot25row) : '') + '</td>';

    let totB26row = 0, anyB = false;
    for (const l of LABOR) {
      const v = budgetMetricVal(pp, l);
      if (v != null) { totB26row += v; anyB = true; }
      if (state.editMode && isHC) {
        const bHC = getBudgetHC(2026, pp, l) ?? 0;
        html += '<td class="sec-bdg cell-edit"><input class="bdg-input" type="number" min="0" value="' + bHC + '" data-pp="' + pp + '" data-labor="' + l + '" /></td>';
      } else {
        html += '<td class="sec-bdg">' + (v != null ? fmt(v) : '') + '</td>';
      }
    }
    html += '<td class="sec-bdg sec-end-bdg">' + (anyB ? fmt(totB26row) : '') + '</td>';

    let totA26row = 0, anyA = false;
    if (!isFuture26) {
      for (const l of LABOR) {
        const v = actualMetricVal(2026, pp, l);
        if (v != null) { totA26row += v; anyA = true; }
        html += '<td class="sec-act">' + (v != null ? fmt(v) : '') + '</td>';
      }
      html += '<td class="sec-act">' + (anyA ? fmt(totA26row) : '') + '</td>';
    } else {
      for (let i = 0; i < 6; i++) html += '<td class="sec-act"></td>';
    }
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('grid').innerHTML = html;
  if (state.editMode && isHC) wireBudgetInputs();
}


function wireBudgetInputs() {
  document.querySelectorAll('input.bdg-input').forEach(inp => {
    const pp = parseInt(inp.dataset.pp, 10);
    const labor = inp.dataset.labor;
    const writeValue = () => {
      const v = parseInt(inp.value, 10);
      if (isNaN(v) || v < 0) return;
      if (!budgets[2026]) budgets[2026] = {};
      if (!budgets[2026][pp]) budgets[2026][pp] = {};
      if (budgets[2026][pp][labor] === v) return;
      budgets[2026][pp][labor] = v;
      state.budgetDirty = true;
      document.getElementById('saveBtn').style.display = '';
    };
    // Write on every keystroke so values can never be lost
    inp.addEventListener('input', writeValue);
    inp.addEventListener('change', writeValue);
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        writeValue();
        // Move to next input in the same row, or first input of next row
        const all = [...document.querySelectorAll('input.bdg-input')];
        const idx = all.indexOf(inp);
        if (idx >= 0 && idx < all.length - 1) all[idx + 1].focus();
      }
    });
  });
}


// ========= Save (download JSON) =========
function saveBudget() {
  // Compress current expanded budget back to sparse (only PPs where it changes)
  const sparse = {};
  let prev = null;
  for (let pp = 1; pp <= PP_COUNT; pp++) {
    const r = budgets[2026][pp];
    if (!r) continue;
    const sig = LABOR.map(l => r[l]).join(',');
    if (sig !== prev) { sparse[pp] = { ...r }; prev = sig; }
  }
  // Stamp with today's date in HST as a new version. If a version with
  // today's date already exists, it overwrites — same-day edits roll up.
  const now = new Date();
  const hst = new Date(now.getTime() - 10 * 3600 * 1000);
  const today = `${hst.getUTCFullYear()}-${String(hst.getUTCMonth()+1).padStart(2,'0')}-${String(hst.getUTCDate()).padStart(2,'0')}`;
  const versions = { ...budgetVersionsRaw, [today]: sparse };
  // Sort versions by date for stable file order
  const sorted = {};
  Object.keys(versions).sort().forEach(d => { sorted[d] = versions[d]; });
  const out = {
    year: 2026,
    labor_types: LABOR,
    versions: sorted,
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'hr_budgets_2026.json'; a.click();
  URL.revokeObjectURL(url);
  // Reflect the new version locally so the dropdown updates without reload
  budgetVersionsRaw = sorted;
  activeVersion = today;
  renderVersionDropdown();
  state.budgetDirty = false;
}

// ========= Wire UI =========
function rerender() {
  computeRates();
  renderTable();
}


document.querySelectorAll('#metricToggle button').forEach(b => {
  b.onclick = () => {
    state.metric = b.dataset.metric;
    document.querySelectorAll('#metricToggle button').forEach(x => x.classList.toggle('active', x === b));
    rerender();
  };
});
document.getElementById('editBtn').onclick = () => {
  state.editMode = !state.editMode;
  const b = document.getElementById('editBtn');
  b.textContent = state.editMode ? 'Stop Editing' : 'Edit Budget';
  b.classList.toggle('primary', state.editMode);
  // Force metric to headcount when editing — only headcount is editable
  if (state.editMode && state.metric !== 'headcount') {
    state.metric = 'headcount';
    document.querySelectorAll('#metricToggle button').forEach(x => x.classList.toggle('active', x.dataset.metric === 'headcount'));
  }
  if (!state.editMode && !state.budgetDirty) document.getElementById('saveBtn').style.display = 'none';
  rerender();
};
document.getElementById('saveBtn').onclick = saveBudget;
document.getElementById('versionSel').onchange = (e) => {
  activeVersion = e.target.value;
  applyActiveVersion();
  rerender();
};

// ========= Init =========
async function init() {
  try {
    document.getElementById('status').textContent = 'Loading…';
    await Promise.all([loadBudget(), loadActuals()]);
    // Surface the data anomaly if present
    const issues = [];
    for (const yr of [2025, 2026]) {
      // Check for collisions: same date appearing once is fine; the issue is when
      // bogus pay_period_start was attached to the same check_date in DB
    }
    // The known issue: 2026 PP6/PP7 share check_date. Since we now key by
    // check_date, both rows merge into one PP automatically — but flag it.
    // (Skipping a runtime check; detection lives at the source.)
    document.getElementById('status').textContent = '';
    renderVersionDropdown();
    rerender();

    console.error(e);

// Version stamp
fetch('index.html', { method:'HEAD' }).then(r => {
  const d = new Date(r.headers.get('last-modified'));
  const pad = n => String(n).padStart(2, '0');
  // HST = UTC-10
  const hst = new Date(d.getTime() - 10 * 3600 * 1000);
  document.getElementById('version').textContent =
    `${pad(hst.getUTCMonth()+1)}-${pad(hst.getUTCDate())} ${pad(hst.getUTCHours())}:${pad(hst.getUTCMinutes())}`;
}).catch(() => {});

init();
</script>
